<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shards of Nyrath</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <div id="screen-menu" class="screen active">
      <h1 class="game-title">Shards of Nyrath</h1>
      <p class="game-subtitle">Powrót do Boskości</p>
      <div class="menu-buttons">
        <button id="btn-continue">Kontynuuj</button>
        <button id="btn-newgame">Nowa Gra</button>
        <button id="btn-meta">Okruchy Boskości</button>
      </div>
    </div>


    <div id="screen-class" class="screen">
      <h2 class="screen-title">Wybierz Aspekt</h2>
      <p class="screen-subtitle">Kim byłeś zanim upadłeś?</p>
      <div id="class-list"></div>
      <button id="btn-back-menu">Powrót</button>
    </div>


    <div id="screen-game" class="screen">
      <div id="game-hud">
        <div id="hud-left">
          <span id="hud-class-icon"></span>
          <span id="hud-class-name"></span>
          <div id="hud-hp-bar">
            <div id="hud-hp-fill"></div>
          </div>
          <span id="hud-hp-text"></span>
        </div>

        <div id="hud-center">
          <span id="hud-floor">Piętro 1</span>
        </div>

        <div id="hud-right">
          <span id="hud-gold">✦ 0</span>
          <span id="hud-level">Poziom 1</span>
          <span id="hud-xp-text"></span>
        </div>
      </div>

      <div id="game-content">
      </div>
    </div>
  </div>

  <script src="js/player.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/map.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
