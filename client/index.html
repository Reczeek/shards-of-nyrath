<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shards of Nyrath</title>
</head>
<body>
    <h1>Shards of Nyrath</h1>

    <div>
        <button id="continue">Kontynuuj</button>
        <button id="new-game">Nowa gra</button>
            <div id="class-select" style="display:none; margin-top:12px;">
                <p>Wybierz aspekt:</p>
                <button data-class="war">⚔️ Aspekt Wojny</button>
                <button data-class="dark">🌑 Aspekt Mroku</button>
            </div>
        <button id="reset-run" style="display:none;">Usuń aktywny run</button>
    </div>

    <div id="gameplay">
        <h3 id="floor-info"></h3>
        <p id="room-info"></p>
        <div id="choices"></div>
        <p id="action-log"></p>

    </div>

    <pre id="debug"></pre>

        <div id="levelup-panel" style="display: none;">
            <p id="unspent-info">Liczba dostęnych punktów statystyk: ${run.unspentStatPoints}</p>
            <button data-stat="VIT">+ VIT</button>
            <button data-stat="STR">+ STR</button>
            <button data-stat="DEF">+ DEF</button>
            <button data-stat="AGI">+ AGI</button>
            <button data-stat="INT">+ INT</button>
        </div>
    </div>

    <div id="debug"></div>

    <script type="module" src="./main.js"></script>
</body>
</html>
